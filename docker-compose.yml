services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: private_pub
      POSTGRES_PASSWORD: private_pub
      POSTGRES_DB: private_pub
    ports: ["127.0.0.1:5432:5432"]
    volumes: [postgres-data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U private_pub"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: valkey/valkey:8-alpine
    ports: ["127.0.0.1:6379:6379"]

  api:
    image: node:22-alpine
    working_dir: /workspace
    command: sh -c "corepack enable && pnpm install --frozen-lockfile && pnpm --filter @private-pub/api dev"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://private_pub:private_pub@postgres:5432/private_pub?schema=public
      REDIS_URL: redis://redis:6379
    ports: ["127.0.0.1:4000:4000"]
    volumes: [.:/workspace]
    depends_on:
      postgres: { condition: service_healthy }

  worker:
    image: node:22-alpine
    working_dir: /workspace
    command: sh -c "corepack enable && pnpm install --frozen-lockfile && pnpm --filter @private-pub/worker dev"
    env_file: .env
    environment:
      API_URL: http://api:4000
      REDIS_URL: redis://redis:6379
    volumes: [.:/workspace]
    depends_on: [api, redis]

  web:
    image: node:22-alpine
    working_dir: /workspace
    command: sh -c "corepack enable && pnpm install --frozen-lockfile && pnpm --filter @private-pub/web dev"
    env_file: .env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
      INTERNAL_API_URL: http://api:4000
    ports: ["127.0.0.1:3000:3000"]
    volumes: [.:/workspace]
    depends_on: [api]

volumes:
  postgres-data:
